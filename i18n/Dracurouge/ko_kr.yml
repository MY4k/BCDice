        - 연(憐) 상대를 연민하고 자비를 품는다. / 멸(蔑) 상대를 깔보고, 경멸한다.
        - 우(友) 상대에게 우정을 가진다. / 질(嫉) 상대를 선망하고, 질투한다.
        - 신(信) 상대를 신뢰한다. / 욕(欲) 상대를 탐내고, 자신의 것으로 삼고 싶어 한다.
        - 애(愛) 상대를 좋아하고, 사랑한다. / 노(怒) 상대에게 분노를 느낀다.
        - 경(敬) 상대의 실력이나 정신을 존경한다. / 살(殺) 상대에게 살의를 품고, 없애고자 한다.
        - 주(主) 상대를 주인으로 섬기며, 충성을 맹세한다. / 원(怨) 상대를 원한을 품고, 원수로서 노린다.

