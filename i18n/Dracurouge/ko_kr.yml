ko_kr:
  Dracurouge:
    CT:
      name: 타락표
      table:
        "0": 당신은 완전히 타락했다. 이 시점에서 당신은 [벽의 꽃]이 되며, 늑대인간, 검은 염소, 야수경 중 하나가 된다. 그 [막]이 종료된 후에 세션에서 퇴장한다. P238의「소멸・완전한 타락」도 참조할 것.
        "1": 당신의 육체는 정신에 어울리는 변이를 일으킨다⋯⋯.「타락의 조짐표」를 2번 굴려 특징을 얻는다. 이 세션 종료 후,【길】을「야수」로 변경할 것.(이미「야수」라면【길】은 바뀌지 않는다)
        "3": 당신의 육체는 정신에 어울리는 변이를 일으킨다⋯⋯.「타락의 조짐표」를 1번 굴려 특징을 얻는다. 이 세션 종료 후,【길】을「야수」로 변경할 것.(이미「야수」라면【길】은 바뀌지 않는다)
        "5": 고결한 마음도 이윽고 타락한다. 당신이 지금 가장 많은 루주를 가진 대상에 대한 루주를 모두 잃고, 같은 분량의 누아르를 얻는다. 누아르를 얻은 결과【갈증】이 3점 이상이 되었을 경우, 타락표를 다시 굴릴 것.
        "6": 내면의 짐승이 숨을 쉰다⋯⋯. 당신이 지금【갈증】을 얻은 누아르의 대상에게, 임의의 누아르 2점을 획득한다.
        "7": 내면의 짐승이 숨을 쉰다⋯⋯. 당신이 지금【갈증】을 얻은 누아르의 대상에게, 임의의 누아르 1점을 획득한다.
        "8": 날뛰는 마음을 가라앉힌다⋯⋯. 다행히 아무 일도 일어나지 않았다.
        "99": 당신은 미친 듯이 날뛰는 감정을 억누르고 자신을 다스렸다!【갈증】이 1 감소한다!
