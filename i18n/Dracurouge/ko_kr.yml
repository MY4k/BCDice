    table:
      CO:
        name: 서훈 표
        year_title: 서훈 연령
        items:
        - 타락의 피：귀경은 타락자에게 습격당했고, 그 결과⋯⋯ 기사가 되었다. 귀경에게 흐르는 것은 타락한 피인 것이다.
        - 역겨운 피：이성을 잃은 주인은 타락 하면서, 공작의 윤허도 없이 귀경을 서훈했다 . 남겨진 귀경은⋯⋯ 의심의 눈초리를 받게 되었다.
        - 사악한 거래：귀경은 주인과 사악한 거래 끝에 서훈을 받았다. 주인은 부덕의 몸이며, 이제 귀경의 입장은 주인의 노예나 다를 바 없다.
        - 배신의 예언：서훈 당시, 현자는 귀경에게 예언을 했다. ⋯⋯언젠가 믿었던 자에게 배신당할 날 이 오리라고.
        - 모략：귀경은 기사가 해서는 안 될 행위로 다른 이들을 걷어차고 서훈을 얻어냈다. 그 비밀을 아는 이는 없다. 아직까지는.
        - 불길한 예언：서훈 당시, 현자는 귀경에게 예언을 했다⋯⋯ 소중한 자를 자신의 손으로 해치게 되리라고.
        - 타락의 유혹：서훈 당시, 귀경의 뇌리에 타락한 자신의 모습이 나타났다. 그리고 타락해야 한다고 속삭였다. 지금도, 이따금.
        - 불상응：다른 종자는 모두 뛰어난 재능을 가지고 있었다. 귀경 에게는 아무것도 없다. 그런데 주인은 어째서 인지 귀경을 선택했다.
        - 왜소한 주인：서훈과 함께 사물을 보는 눈도 달라졌다 . 서훈 이후, 주인이 시시한 존재로 보였다. 귀경은 주인의 곁을 떠났다.
        - 가정이 있었으나：귀경은 사람으로서 가정을 꾸리고 있었다. 그러나 주인으로부터 서훈을 받을 수 있다면 하는 생각에. 귀경은 가정을 버렸던 것이다.
        - 달콤한 꼬드김：귀경은 주인을 달콤한 말로 꼬드기고 마음을 녹여 서훈을 내리게했다. 정신 면에서 주인은 오히려⋯⋯ 귀경의 것이다.
        - 불안：기사란 무엇인가 . 서훈 이란 무엇인가. 기사 그 자체가 된 지금도, 경은 말할 수 없는 불안을 느끼고 있다⋯⋯.
        - 망각：누가 귀경을 기사로 만들었는가. 솔직히 모른다⋯⋯ 정신이 들고보니 기사가 되어 있었던 것이다.
        - 어느 밤의 침실：그것은 충동적인 행위 였으리라. 주인은 어느 날 밤, 갑자기 찾아와⋯⋯ 당신에게 입을 맞추고 서훈을 해주었던 것이다.
        - 생존자：타락자, 혹은 태양 의 파편에게 습격을 당해 주인의 종자는 전멸. 귀경만이 살아남아⋯⋯ 서훈을 받았다.
        - 헌신의 맹세：서훈 당시, 귀경은 백성을 끝까지 지키겠노라고 맹세했다. 귀경은 백성의 방패 이자, 수많은 적을 물리친 창이다.
        - 죄를 용서받아：귀경은 죄를 범했다. 죄인으로서 처벌을 받는 가운데, 주인은 귀경을 인정하고 서훈까지 내려주었다. 보답해야만 한다.
        - 비밀을 지킬 맹세：서훈 당시, 귀경은 주인에게서 비밀을 들었다. 그리고 그것을 결코 남에게 발설하지 않겠노라 맹세했다.
        - 승자는 하나：그날 , 주인의 여러 종자 사이에서 무술 시합이 이루어 졌다. 귀경은 모두를 꺾고 마침내 서훈을 얻었던 것이다.
        - 갈고 닦은 기술：이제까지 하나의 기술을 갈고 닦아 극치에 이르렀다. 그 우직 하게 갈고 닦은 기술이 평가를 받아 귀경은 서훈을 받은 것이다.
        - 무훈의 예언：서훈 당시, 현자는 귀경에게 예언을 했다. 언젠가 대란이 일어난 가운데, 눈부신 무훈을 거두리라고.
        - 씻을 수 없는 상흔：귀경의 몸에는 지워지지 않는 상흔이 새겨져 있다. 그러나 상처를 입으면서까지 주인을 지켜낸 공이 바로 귀경을 기사로 만들었다.
        - 융성의 예언：서훈 당시, 현자 는 귀경에게 예언 을 했다⋯⋯ 그 이름 은 재물과 명예에 둘러싸인 안온함 속에 있으리라고.
        - 담력：귀경은 주인과 함께 타락자 에게 습격당해⋯⋯ 한걸음도 물러나지 않았기에, 그 담력을 인정 받아 서훈을 받았다.
        - 우정의 예언：서훈 당시, 현자 는 귀경에게 예언을 했다⋯⋯ 언젠가 멋진 벗을 얻으리라고.
        - 안타까운 자：오래도록 종자로서 살아오는 가운데, 귀경은 늙었다. 그러나 늙어서도 주인은 귀경을 필요로 했다. 그렇기에 서훈을 받은 것이었다.
        - 수호의 맹세：서훈 당시, 어떤 사람을, 도시를, 나라를 지키겠노라고 맹세 했다. 그것을 짊어지고 적에게 맞서는 한, 당신은 도망치지 않을 것이다 
        - 못다 갚을 은혜：어느 날, 귀경은 죽었다⋯⋯ 그러나 귀경은 주인의 서훈 덕에 되살아났다. 주인은 벌을 받았으나, 그래도 웃고 있었다.
        - 신앙의 맹세：서훈 당시, 귀경은 드라쿨 에게 깊은 신앙을 맹세 했다. 붉은 달 아래, 귀경의 승리는 드라쿨에게 바쳐지리라.
        - 끝나지 않는 사랑：기사와 서로 사랑에 빠졌다. 달콤하고도 미칠 듯한 시간, 그저 흘러가는 세월. 귀경은 연인의 손에 서훈을 받아 기사가 되었다.
        - 영웅의 예언：서훈 당시, 현자는 귀경에게 예언을 했다⋯⋯ 가공할 적을 타도 하고, 귀경의 이름은 뭇 나라에 널리 퍼지리라고.
        - 충의의 맹세：서훈 당시, 어떤 이에게 깊은 충성을 맹세했다. 설령 세계를 적으로 돌리더라도 귀경이 배신하는 일은 없을 것이다.
        - 살아있는 예술：서훈 으로 귀경의 미모는 한층 드높아졌다. 이제 귀경을 보고 마음을 빼앗기지 않는 이는 존재하지 않는다.
        - 생각지 못한 무훈：귀경은 종자의 몸으로 생각지 못한 무훈을 세웠다. 그 공은 서훈을 받기에 충분한 것이었다.
        - 당주의 총애：귀경은 공작가 당주 본인의 총애를 얻었다. 궁정에서 책임 있는 지위를 얻게 되리.
        - 시조의 총애：귀경은 시조 본인의 총애를 얻었다. 진조 드라쿨에게 가장 가까운, 마땅히 자랑스러워 해야 할 사람 중 하나가 된 것이다.
      CA:
        name: 서훈 후 표
        year_title: 기사력
        items:
        - 멸망：귀경의 영지는 적에게 멸망당했다. 지켜야 할 백성들은 모두 죽고, 명예는 잃어버렸다. 그 자들을 용서할 수는 없다.
        - 누명：귀경은 애먼 죄를 짊어지고 있다. 누군가의 음모가 귀경을 옭아매 죄를 뒤집어씌운 것이다.
        - 저주：과거 귀경은 요정에게 저주를 받았다. 저주는 천천히 귀경을 잠식해, 재앙을 가져오고 있다.
        - 피의 고양：싸운 후에는 몸이 뜨겁게 달아오르며, 어찌할 수 없을 정도로 흥분된다. 타락의 날은 머지않았다⋯⋯ 귀경의 마음속에는 확신이 있다.
        - 보복의 서장：과거 귀경의 명예는 벗에게 배신당해 빼앗겼다. 지금은 새로운 길을 걷고 있으나, 복수는 아직 잊지 않았다.
        - 원수：잊어버려서는 안 될 적이 있다. 놈의 가슴을 꿰뚫고 목을 쳐 버릴 때까지, 귀경에게 안식의 날은 찾아오지 않는다. 찾아오지 않는 것이다.
        - 타락의 공명：귀경의 영혼은 타락해 가고 있는 것일까. 타락한 자들이 주체할 수 없을 정도로 가깝게 느껴지고 마는 것이다.
        - 부덕한 나날：과거의 귀경은 품행방정하다고는 말하기 힘든 자였다. 마음을 바꿔 먹기는 했지만, 아직 세간의 눈은 냉담하다.
        - 주인의 타락：귀경을 서훈한 주인이 타락했다. 주인을 자랑스러워했던 귀경은, 무분별한 다른 기사들로부터 모멸과 의혹을 받기 일쑤다.
        - 명왕의 포로：명왕의 침공 중, 귀경은 패배하여 한때나마 포로가 되는 치욕을 받았다. 놈들을 용서할 수는 없다.
        - 가까운 타락：귀경의 벗이나 연인이 타락했다. 그것은 결코 씻을 수도, 잊을 수도 없다. 항상 마음속에서 유령과도 같이 고개를 들고 있는 것이다.
        - 수라：귀경은 싸우고 또 싸웠다. 공을 다른 자들에게 양보해서라도 싸우고, 싸우고, 싸우고 또 싸워. 싸우기만 하는 존재가 되고 있다.
        - 공백：기사가 된 후로, 떠올릴 수 없는 시기가 있다. 그동안 무슨 일이 있었는지, 귀경은 아무것도 모른다.
        - 추적：타락한 벗을 추적하고 있다. 그가 소중했기에, 귀경이 결판을 내야만 하는 것이다.
        - 지루함：변함없는 일상. 보람 없는 하루하루. 동료의 무훈을 듣고, 귀경은 자신도 공을 세우고자 일어났다.
        - 실연：사랑이 깊기에 귀경은 사랑을 버렸다. 완전히 버리지는 않았는지도 모르지만, 버렸다고 믿었다.
        - 은둔：싸움에 허무함을 느꼈던 것은 언제부터였을까. 용맹한 기사였던 귀경이, 지금은 조용히 은자로서 살아가고 있다.
        - 의문의 실종：귀경의 소중한 이가 갑자기 자취를 감추고 말았다. 납치당한 것인지, 도망친 것인지, 아니면 설마⋯⋯.
        - 우물 안 개구리：자신이야말로 최고의 기사라 생각했던 귀경이지만⋯⋯ 그 기사를 보고 모든 것은 무너졌다. 아직도 수련이 부족하다.
        - 현자의 예언：예언이 귀경을 인도하고 있다. 귀경은 누군가와 만나야만 한다. 그것은 주군인지, 벗인지, 연인인지...... 혹은 적인지.
        - 염문：많은 사랑을 뿌리고 다니는 귀경의 이름은 궁정에서 유명하다. 적도 아군도, 분명 다 품을 수 없을 정도로 많을 것이다.
        - 주시자：백성들이 변해가는 모습을 지그시 바라보고 있다. 귀경은 어지러이 변화하는 그들을 바라보는 것을 좋아한다.
        - 찾는 이：귀경은 귀경의 마음을 움직였던 사람을 찾고 있다. 인간이다. 사람은 나약하고 변화하기 쉽다. ⋯⋯어서 찾아야만 한다.
        - 깊은 총애：귀경은 주인으로부터 깊은 애정을 받아왔다. 그렇기에 서훈은 매우 오래전에 받았으나, 기사로서 활동을 시작한 것은 최근이다.
        - 혈기왕성：귀경은 많은 기사와 맞서, 자신의 기술과 힘을 갈고닦고 싶다. 실력 있는 기사를 발견하면 도전하지 않을 수 없다.
        - 계몽：지고한 존재인 기사와 달리, 세상에는 어리석고 가엾은 백성들이 넘쳐난다. 기사로서 그들을 이끌어 주어야만 하리라⋯⋯.
        - 반드시 서훈을：필요한 이가 있다. 그를 서훈해야만 한다. 그러기 위해 귀경은 서둘러 공을 세우려 한다.
        - 우국지사：귀경은 나라의 현재 상황을 근심하고 있다. 궁정의 문제는 바로잡아야만 한다고 마음속 깊이 맹세했다.
        - 서훈을 내리다：공은 많지 않으나 나름대로 고참인 귀경은, 자신의 종자를 서훈하여 기사로 만든 경험이 있다.
        - 타락자의 포로：귀경은 한때 타락자의 포로가 되어 노리갯감으로서 하루하루를 살아간 적이 있다. 굴욕이자 오명이다⋯⋯.
        - 명승부：귀경은 자신의 의지를 관철하기 위해 결투하여 승리했다. 그 결투는 인근에서도 소문난 명승부로 전해지고 있다.
        - 긴 잠：귀경은 과거 태양의 파편과 싸워, 몸의 많은 부분을 상실하고 잠에 빠졌다⋯⋯ 꽤나 오래 잠들어 있었던 모양이다.
        - 세계는 넓고：기사가 되어 세계가 넓다는 것을 알았다. 가능한 한 세계를 알고 싶다⋯⋯ 귀경은 넓은 세계를 보고 들으려 한다.
        - 왕의 그릇：서훈 이후, 사람을 무릎 꿇리는 압도적인 매력을 얻었다. 그것은 그야말로 지배자가 되기 위해 주어진 자질이다.
        - 고명：수많은 결투나 마상 시합에서 실력을 보여 왔다. 당신은 실력 있는 기사로서 명성을 떨치고 있다.
        - 전설：귀경은 아직까지 위업은 많지 않으나, 그 일화는 전설의 영역에 있다. 이미 음유 시인들의 노래가 되기까지 했다.
      EP:
        name: 까마득한 과거 표
        year_title: 기사력
        items:
        - 오래된 죄인：지옥이 태어나기도 전. 모두가 잊어버린 감옥에 갇혀 있었던 죄인⋯⋯ 그것이 귀경이다. 수백 년을 거쳐, 마침내 감옥은 뚫렸다.
        - 지옥 유출：귀경은 부덕과 타락을 거듭하여 지옥에 유폐되었다⋯⋯ 그랬어야 했다. 하지만, 정신이 들고 보니 밖에 있었으며, 수백 년이 흐른 후였다⋯⋯.
        - 금기의 탐구：이미 죽은 한 명의 백성⋯ 혹은 기사를, 귀경은 되살리고자 하고 있다. 외법의 소행이다. 알고는 있지만⋯⋯ 포기할 수는 없다.
        - 타락한 몸：한번은 타락하여, 수치와 부정에 찌들었다. 배려심 있는 벗들이 구해주었으나, 오명은 지금도 따라다니고 있다. 타락의 조짐이 전부 사라졌더라도.
        - 겁쟁이의 추태：태양룡이 나타났을 때, 귀경은 공포로 토벌의 소집에서 도망쳤다. 이 수치는 오랜 세월이 지난 지금도 귀경의 마음을 짓누르고 있다.
        - 무한한 복수：귀경은 이 세상의 부조리에 울어야만 했다. 그렇기에 끝나지 않는 복수를 시작한 것이다. 이 세계 전체를 바꿔버리기 위해⋯⋯.
        - 악한 발단：과거의 귀경은 좋지 못한 생각에 사로잡혀 있었다. 과거의 활동은 지금도 사악하나 후계자를 낳고 있다. 막아야만 한다.
        - 요정의 고리：요정의 유혹에 넘어가 하룻밤의 연회를 즐겼다. 그리고 지금⋯⋯ 그때로부터 수백 년이 지났다. 귀경을 아는 기사는, 없을 것이다.
        - 파멸의 역병：그 무렵, 역병은 노스페라스 이외의 지역도 침범했다. 귀경의 고향 또한⋯⋯ 백성을 죽게 내버려두었던 귀경이 명왕을 나무랄 수 있을까?
        - 주인의 타락：귀경을 서훈했던 주인이 타락했다. 그동안 주인을 자랑스러워했던 귀경은 자신의 마음속에서 무언가 소중한 것이⋯⋯ 뭉텅 빠져나가는 기분이었다.
        - 이단의 벗：과거에는 이단과 기사의 거리가 가까웠다. 귀경에게는 이단 친구가 있었으며, 거리를 두면서도 서로를 돕곤 했는데⋯⋯.
        - 시간을 넘어서：무슨 일이 있었는지는 알 수 없다. 그러나 정신이 들고 보니 까마득한 미래의 대지에 서 있었다. 수백 년이나 되는 공백이, 지금도 귀경을 짓누르고 있다.
        - 태양룡 습격：저 유명한 태양룡에 의한 습격을, 귀경은 직격으로 받았다. 지켜야 할 영지는 사라지고, 토벌해야 할 태양룡 또한 자신의 손으로 없애지 못했다.
        - 수많은 타락：아는 이 대부분이 타락해 떠나갔다. 과거의 벗 중에서 지금도 남아있는 이는 얼마 되지 않는다. 결코 타락하지 않으리라고 굳게 결의는 하고 있지만⋯⋯.
        - 최후의 명령：태양룡 토벌 당시, 어떤 장군이 귀경을 감싸주면서 불귀의 객이 되었다. 최후의 명령은「살아라」―― 그 후, 귀경은 명령을 계속해서 지켜오고 있다.
        - 지금은 후일담：귀경은 복수를 성취했다. 그리고 이루어야 할 것을 잃었다. 간신히 타락은 면하고 있으나, 새로운 삶의 보람을 찾아야만 한다.
        - 지켜야 할 땅：어떤 영주가 타락했다. 참극이 끝난 후, 이제 그곳에는 아무도 살지 않는다. 그러나 귀경이 그와 지냈던 추억은 있다. 지켜야만 한다.
        - 개척자：백성의 마음을 알고 싶어서, 귀경은 홀로 황야를 개척했다. 이윽고 마을이 생겨나고, 귀경은 영주가 되었다. 그 땅은 귀경의 두 번째 고향이다.
        - 자신만이：태양룡 토벌 당시, 눈앞에서 게이즈발트 가문이 멸망했다. 귀경에게 조금이라도 용기가 있었더라면 그 가문은 남아있이 않았을까⋯⋯.
        - 신앙의 나날：승정으로서 배전에 틀어박힌 채 위대한 드라쿨께 감사를 바쳐왔다. 지금도 붉은 달을 올려다볼 때, 귀경의 마음에는 감사가 차오른다.
        - 총애받는 나날：서훈의 주인은 귀경을 저택 안에서 소중히 다루어주었다. 기사로서는 마음에 안 드는 면도 있었으나, 사람으로서는 그를 사랑하고 있다.
        - 방관의 나날：백성들이 변해가는 모습을 가만히 바라보고 있다. 귀경은 어지러이 변화하는 그들을, 은자로서 바라보는 것을 좋아했다.
        - 편력의 나날：편력의 기사로서 여러 영지를 떠돌며, 수많은 기사, 수많은 모험, 수많은 사랑 속에서 지내왔다. 지금도 빛바래지 않는 아름다운 추억이다.
        - 충성의 나날：섬겨야 할 분을 발견해, 귀경은 모든 것을 바쳐 그 사람을 지켜왔다. 그 충성은 아직도 사라지지 않고 있다⋯⋯.
        - 백성의 혈통：서훈을 받아 기사가 되었으나⋯⋯ 백성 시절을 버릴 수는 없었다. 귀경은 계속, 계속, 자신의 혈연이나 벗의 자손을 지켜보고 있다.
        - 긴 잠：삶에 지쳤는지, 부상을 입었는지, 귀경은 길고 긴 잠에 빠졌다. 그리고 최근에야 겨우 눈을 뜬 참이다.
        - 명왕과 후회：과거 노스페라스에서 지위를 얻은 적이 있다. 그러나 그 재앙 속에서 귀경은 도망쳤던 것이다. 명왕으로 변한 그녀를 저버리고⋯⋯.
        - 발흥의 협력자：귀경은 로젠부르크 발흥을 위해 그란츠 공에게 협력해왔다. 그의 이면도 표면도 잘 알고 있으며, 그곳에서 세력도 쌓고 있다.
        - 노스페라스：귀경은 노스페라스 말기, 역병 속에서 서훈을 받아 구제받은 기사. 명왕과 그 일당의 풍평을 무엇보다도 씁쓸한 심정으로 보아온 사람이다.
        - 재산：오랜 세월 속에서, 귀경은 많은 물건이나 건물을 구현화하여, 영속화했다. 귀경의 주위는 자신이 만들어낸 것으로 넘쳐난다.
        - 요정의 나라：기사를 은퇴하고, 역대 아발롬 공과도 같이 요정들의 나라에서 즐겁게 생활하고 있었다. 오늘 밤, 기사로서 세상에 나온 것은 변덕에 불과하다.
        - 수많은 무훈：수많은 싸움을 거쳐온 귀경은 헤아릴 수도 없는 무훈을 세웠다. 하나하나를 다 헤아리는 것도 이제는 어리석게 여겨질 정도로.
        - 혈통의 중진：혈통이란 기사를 에워싸는 가장 큰 틀이자 파벌이다. 그리고 귀경은 혈통 내에서 큰 발언력을 가진 중진이다.
        - 시조의 친분：시조도 마음이 적적해질 때가 있다. 귀경은 어떤 시조와 친분이 있다. 그녀에게 당신은 마음을 허락할 수 있는 얼마 안 되는 존재인 것이다.
        - 태양룡 토벌：저 가공할 태양룡 토벌에 참가하여 화려한 활약을 장식했다. 그런 한편, 귀경은 수많은 희생자 또한 직접 보았다.
        - 최초의 기사：귀경이 바로 진조 백년상이 끝났을 때, 시조 본인으로부터 최초기에 서훈을 받았던 기사. 상야 전 역사의 산 증인이다.
      OS:
        name: 윈죄 표
        year_title: 외견 연령
        items:
        - 학대：그 지옥 같은 나날 속에서 그대가 당해 온 일을 떠올리면⋯ 누구든, 상야국 전체를 똑같이 저주할 수밖에 없다.
        - 들개처럼：고아였던 그대는 훔치고 죽이고 속이며 살아왔다. 수단은 가리지 않았다. 죄인으로 붙잡히지 않고 달아날 수 있었던 것은 하늘의 운이었을까.
        - 약육강식：폭력으로 원하는 것을 빼앗아 온 그대는 약탈자이자 사냥꾼이다. 아무리 겉을 꾸며도 세상을 지배하는 것은 짐승의 법칙뿐이다.
        - 검은 충동：폭력성과 잔혹성이 그대 안에 잠들어 있다. 그것은 때때로 돌연 모습을 드러내어⋯ 소중한 것을 파괴한다.
        - 얼어붙은 마음：혹독한 나날 속에서 그대의 마음은 얼어붙었다. 이단으로서 힘을 얻은 지금도⋯ 마음 속의 얼음은 아직 녹지 않았다.
        - 생존자：타락자, 혹은 태양의 파편의 습격을 받아 고향은 전멸했다. 그대만이 살아남았다. 짊어진 영혼은 수도 없이 많다.
        - 피의 갈증：백성의 몸을 흐르는 피에 기이한 집착을 느끼고 만다. 도저히 견딜 수 없을 때는 자기 피를 핥기까지 한다.
        - 조롱거리：언제나 주변에서 누군가가 비웃는다. 누구나 그대를 비웃는다. 무엇이 잘못되었다는 것인가, 무엇이 우스꽝스럽다는 것인가.
        - 죽은 이를 앞에 두고：소중한 사람이 죽었다. 썩어 가는 시체를 보고 죽음의 끔찍함을 알게 되었다. 무슨 일이 있어도 결코, 죽을 수는 없다.
        - 기사에 대한 질투：그대는 기사라는 존재를 질투하고 있었다. 아름답고 강하며 늙지 않는 자들⋯ 어째서 놈들은 찬란하고, 나는 비참한가.
        - 짊어진 죄：예전에, 잠깐의 장난기가 사람을 죽게 만들었다. 아무리 시간이 흘러도 처음 새겨진 죄는 사라지지 않는다.
        - 기사의 타락：잘 아는 기사가 타락하여 폭정을 저질렀다. 그대는 기사라는 존재가 이단과 조금도 다르지 않다는 것을 알고 있다.
        - 태양의 환상：예전부터 가끔 태양에 비친 대지의 꿈을 꾼다. 그것은 결코 나쁜 세계가 아니었던 것처럼 느껴지는데⋯.
        - 퇴폐：술과 색욕에 빠져 그대는 어찌할 도리 없는 폐물이 되어 있었다. 떠올리고 싶지도 않은, 나태와 탐욕에 빠져 있던 나날.
        - 허영：누군가에게 인정받고 싶어서, 자신을 거짓으로 덧칠해 왔다. 노력보다도 거짓을 더 쌓아 올리며 살아왔다.
        - 흑역사：예전의 자신은 약하고 어리석었다. 돌이켜 보면 머리를 쥐어뜯으며 사라져 버리고 싶다는 생각뿐이다.
        - 새겨진 공포：무서운 존재와 마주친 적이 있다. 타락자였을까, 요정이었을까, 태양이었을까. 그 공포는 아직도 그대 안에 새겨져 있다.
        - 혈기왕성：예전부터 지나치게 성급하다는 말을 들어 왔다. 하지만 세월이 흘러도 기질은 고쳐지지 않았다. 그대의 마음은 지금도 젊고 미숙하다.
        - 고독에 대한 공포：혼자인 것은 무섭다. 외로움은 공포다. 비위를 맞춰서라도, 이용당해서라도, 누군가 곁에 있어 주지 않으면 미쳐 버릴 것만 같다.
        - 들짐승처럼 자라다：숲이나 황야에서 홀로 살아왔다. 짐승도 인간도 다를 바 없다. 그저 한 마리 짐승으로 살아왔을 뿐이다.
        - 으르렁거리는 짐승：사람을 위압적으로 대하고 만다. 우호적으로 대하고 싶어도 그게 되지 않는다. 그대의 미소는 이빨을 드러낸 짐승과도 같다.
        - 변덕：어쩐지 눈앞의 것에 쉽게 정신이 팔린다. 차분히 생각하지 못한다. 세월이 흘러도 변하지 않는 성미다.
        - 공백：아주 먼 옛날, 이단의 힘을 얻기 전의 자신을 기억하지 못한다. 떠올리려 하면 머릿속에 안개가 낀다.
        - 소생의 염원：소중한 사람이 죽었다. 하지만 포기할 수 없다. 포기하지 않는다. 분명 어딘가에, 해결책이, 되살릴 방법이 있을 것이다.
        - 책벌레：조용히 책을 읽는 것을 좋아한다. 책 속의 세계, 자신의 세계에 몰두하고 싶다. 밖에서 뛰어다니는 것은 서툴다.
        - 늙고 추한 몸：늙어 썩어 가는 공포. 죽음에 대한 혐오. 필사적으로 몸부림치며 그대는 그것으로부터 달아나려 했다.
        - 호기심：눈길을 끄는 것이 있으면 반드시 바라본다. 비밀이라면 파헤치지 않고는 견딜 수 없다. 모른 채 넘어갈 수는 없는 것이다.
        - 사랑에 약함：쉽게 사랑에 빠지고 만다. 사소한 인연만으로도 연인이라 여겨 마음까지 다 바치고 만다.
        - 이루어질 수 없는 첫사랑：어떤 백성을 사랑했다. 사랑은 이루어지지 않았고, 그 사람은 그대의 앞에서 사라졌다. 하지만 그 미소는 지금도 그대에게 힘을 준다.
        - 순수한 영혼：속세의 사념에서 너무나 멀리 떨어져 살아왔기에, 그대의 영혼은 끝없이 티 없이 아름답다. 그리고 연약하다.
        - 평온：그대는 가족에게 둘러싸여 사랑이 가득한 삶을 살았다. 평범한 생활, 평범한 나날. 아주, 아주 행복했다.
        - 달콤한 꿈：세상을 아무것도 모르던 달콤한 꿈의 나날. 그 꿈에서 깨어난 것이 행복이었을까, 불행이었을까. 아니면 지금도 여전히 꿈속일까.
        - 미모：누구나 부러워하고 돌아보게 되는 미모. 그 아름다움은 주위에 널리 알려졌고, 기사들조차 그대를 찬미했다.
        - 요정의 벗：요정을 끌어당기는 기묘한 매력을 타고났다. 어린 시절부터 그대는 요정과 짐승의 벗이었다.
        - 기사의 봉사자：그대는 아름다운 기사 밑에서 일하고 있었다. 신뢰와 동경을 키워 왔고, 그 입장에 자부심도 품고 있었지만⋯.
        - 신동：그대는 넘치는 재능을 타고났다. 기사로 성장하리라 여겨졌지만⋯.
      RS:
        name: 근황 표
        year_title: 활동 년 수
        items:
        - 악몽：잠에 들 때마다 수난의 기억이 되살아난다. 그대의 마음은 맑아지지 않고, 끔찍한 악몽이 끊임없이 따라붙는다.
        - 피의 격앙：싸움을 마친 뒤에는 몸이 달아오르고 흥분이 가라앉지 않는다. 어쩔 수 없이 몸이 꿈틀거린다. 타락의 날은 머지않았다⋯ 그대는 그렇게 확신하고 있다.
        - 도주：이단 심문관에게 쫓겨 오래 살던 땅을 떠나야 했다. 백성들 또한 이단을 의심스러운 눈으로 바라본다. 살아가기 힘들다.
        - 타락의 공명：그대의 영혼은 이미 타락해 가고 있는 것일까. 타락한 자들이 어쩐지 가까운 존재처럼 느껴진다.
        - 죽음을 원하는 자：이미 지겹도록 살았다. 타락자나 태양을 조금이라도 끌어들여⋯ 자신에게 어울리는 장소에서 사라지고 싶다.
        - 재서훈의 의식：기사를 이단경으로 바꾸는 방법을 그대는 알고 있다. 그리고 실제로 한 명의 이단경을 만들어 내기도 했다.
        - 개심：과거의 그대는 형편없는 악당이었다. 마음을 고쳐먹었지만⋯ 이단을 향한 세상의 시선은 여전히 냉혹하다.
        - 추적：타락한 친구를 찾고 있다. 그가 소중하기에, 그 일은 반드시 자신의 손으로 끝내야 한다.
        - 폭풍의 예감：그대에게는 예감이 있다.  상야국 가까운 곳에서 끔찍한 재앙이 일어날 것이다. 가능한 한 많은 이들에게 알려 대비해야 한다.
        - 가면：상처받는 것이 두려워 표정을 꾸몄다. 진짜 자신을 숨겨 왔다. 이제 그대는 진짜 자신이 어떤 존재인지조차 잊어버리고 있다⋯.
        - 묘지기：가까웠던 이들이 죽어 묻힌 무덤을 지키고 있다. 모두가 사원의 묘지에 묻히는 것은 아니기 때문이다.
        - 공백：지금의 몸이 된 이후 기억나지 않는 시기가 있다. 그 사이에 무슨 일이 있었는지, 그대는 전혀 알지 못한다.
        - 실연：그대가 이단이기 때문일까, 아니면 성격 때문일까. 한 번의 사랑이 끝났다. 지금도 상심한 채로 떠돌고 있다.
        - 주군을 위하여：기사인가 이단인가. 그대에게는 마음속으로 섬기기로 정한 주군이 있다. 그분의 명령에 따라 그대는 움직인다.
        - 햇병아리：그대는 아직 막 이단이 되었을 뿐이다. 얻은 힘에 휘둘리고 있으며, 수난을 겪어도 아직 깨닫지 못한다. (※오래된 이단은 선택할 수 없다)
        - 권태：변하지 않는 일상, 보람 없는 나날. 서서히 썩어 가는 감각. 이대로 자신을 잃고 타락해 버리는 것일까.
        - 은둔：백성의 시선과 기사들의 시선은 평온을 깨뜨린다. 그대는 자신의 평온을 위해 혹독한 자연 속에서 은둔하고 있다.
        - 사랑이 갖고 싶다：쓸쓸하고 사람이 그리운 나날. 누군가를 믿고 싶다. 누군가에게 믿어지고 싶다. 이용당해도 좋으니 사람의 곁에 있고 싶다.
        - 마녀의 예언：그대는 예언에 이끌리고 있다. 누군가를 반드시 만나야 한다. 그가 주군일지, 친구일지, 연인일지⋯ 혹은 적일지라도.
        - 관망인：백성들이 변해 가는 모습을 조용히 바라보고 있다. 그대는 빠르게 변하는 그들을 지켜보는 것을 좋아한다.
        - 후계 찾기：그대는 자신의 마음을 움직일 백성을 찾고 있다. 그를 자신과 같은 존재로 바꾸어 영원한 시간을 함께 보내기 위해서다⋯.
        - 고블린：고블린들의 사랑을 받고 있다. 그들은 종종 그대 앞에 나타나 작은 장난이나 선물을 남기고 간다.
        - 피의 후계：그대는 마음에 든 자를 동로 받아들인 적이 있다. 그리고 그와의 관계는 지금도 이어지고 있다.
        - 신비의 전승：신비한 기술을 백성이나 다른 이단에게 전하고 있다. 오래된 지식을 전하기 위해서, 혹은 단순히 놀라는 얼굴을 보기 위해서.
        - 변혁의 봉화：이단이라 멸시받고 이런 처지로 몰린 현실을 그대로 둘 것인가? 일어나서 바꾸어야 하지 않겠는가?
        - 백성과 함께：오랫동안 백성과 어울려 살아왔다. 많은 감사와 약간의 의심을 받으며 살아가고 있다.
        - 방랑벽：한 곳에 머물 엄두가 나지 않는다. 당신은 늘 길을 걸으며 수많은 마을, 수많은 도시를 건너다녔다.
        - 백성 속에서：적극적으로 백성과 교류하며 그들의 삶에 관여하고 있다. 그대는 인간을 좋아하며, 그들과 접할 때 비로소 자신을 느낄 수 있다.
        - 은혜 갚기：과거에 한 기사나 이단에게 도움을 받았다. 언젠가 그 은혜를 갚아야 한다.
        - 기사의 친구：기사와 시간을 보내며 신뢰를 쌓았다. 기사라는 존재에 대한 거부감은 적다. 서로 도울 수 있을 것이다.
        - 긴 잠：일찍이 귀경은 남몰래 태양의 파편과 싸우다 몸의 대부분을 잃고 잠들었었다⋯ 꽤 오랫동안 잠들어 있었던 것 같다.
        - 영웅의 별：만났던 마녀가 예언했다⋯ 언젠가 그대는 무서운 적을 쓰러뜨리고, 그 이름이 여러 영지에 울려 퍼질 것이라고.
        - 인도하는 자：많은 이단들이 멸시받는 처지를 받아들이고 타락해 간다. 그대가 그들에게 긍지와 가족, 사랑을 가르쳐야 한다.
        - 자애：그대는 모든 것을 사랑한다. 지금은 불행한 오해가 있더라도 그들을 구하려는 손을 거두어서는 안 된다.
        - 살아 있는 예술：그 아름다움 때문에 그대에게 평온은 없다. 모습을 보는 것만으로도 누구나 그대를 동경하고 사랑을 바치려 한다.
        - 전설：그대는 이단이지만 상야국의 역사에 적지 않게 관여해 왔다. 음유시인들에게 노래되는 전설적인 존재다.
      PP:
        name: 평화로운 과거 표
        year_title: 외견 연령
        items:
        - 난폭자：성미가 급하고 기질이 거칠어, 무심코 손이 나가 난폭한 짓을 저지르고 만다. 고향에서의 평판도 그리 좋지 않았다. 지금은 어떨까?
        - 고아：부모 형제도 없이, 오직 혼자 지혜를 짜내어 살아왔다. 자유롭기는 했지만, 혹독한 환경 속에서 그대의 영혼은 단련되어 왔다.
        - 절대적인 공포：어떤 생물이 도저히 견딜 수 없을 만큼 무섭다. 아무튼 생리적으로 도저히 안 된다. 그것을 보는 순간 그대는 꼴사납게 펄쩍 뛰며 도망치고 만다.
        - 술주정：예전부터 술에 취하면 영 좋지 않은 짓만 해 왔다. 이제 더 이상 백성이 아니니 술에 취하지는 않을 터이지만⋯.
        - 게으름뱅이：재능은 있어도 움직이는 것이 너무나 귀찮다. 언제나 어떻게든 편하게 지낼 방법만 생각해 왔다.
        - 내성적：겁이 많고 낯을 가리는 성격이다. 사람과 어울리는 일도 서툴다. 관계는 깊고 좁다. 그런 그대에게도 인연은 생기기 마련이지만⋯.
        - 혈기왕성：예전부터 너무 성급하다는 말을 들어 왔다. 하지만 세월이 지나도 기질은 고쳐지지 않았다. 그대의 마음은 지금도 젊고 미숙하다.
        - 소꿉친구：매우 친한 소꿉친구가 있어 미래에 대해 이야기하곤 했다. 지금 그 사람은 어떻게 지내고 있을까.
        - 잊을 수 없는 맛：그대에게는 도저히 잊을 수 없는 가장 좋아하는 음식이 있다. 이제 백성이 아니게 된 지금도, 그것만은 정신없이 먹어 버릴 것이다.
        - 둔감한 사람：예전에 여러 이성에게 마음을 받았지만, 그대는 전혀 눈치채지 못했다. 최근에야 문득 떠올리고서야 깨달았다.
        - 어떤 이별：친구나 가족이 기사 혹은 이단이 되어 고향을 떠났다. 그러나 같은 시간을 살아가는 지금이라면, 분명 다시 만날 수 있을 것이다.
        - 책벌레：조용히 책을 읽는 것을 좋아한다. 책 속의 세계, 자신의 세계에 몰두하고 싶다. 밖에서 뛰어다니는 것은 서툴다.
        - 반항아：남의 말을 도무지 순순히 듣지 못한다. 무심코 반항해서 주변에 폐를 끼치곤 한다. 세월이 지나도 변하지 않았다.
        - 분위기파：여러 번 실패하면서도 금세 들떠 버린다. 기세에 맡겨 무모한 행동을 하기 쉽다.
        - 호기심：눈길을 끄는 것이 있으면 반드시 쳐다보고 만다. 비밀이라면 파헤치지 않고는 견딜 수 없다. 모른 채 넘어갈 수는 없는 것이다.
        - 설교벽：남의 행동거지가 자꾸 눈에 띄어 무심코 잔소리를 하게 된다. 스스로에게도 엄격하려고 하지만⋯.
        - 힘자랑：타고난 체격과 신체 능력으로 고향에서는 견줄 자 없는 힘자랑이었다. 물론 어디까지나 백성으로서는⋯이지만.
        - 자연 속에서：고향이 벽지에 있었던 것일까. 아니면 들에서 살아왔던 것일까. 그대는 자연에 녹아들어 자연을 잘 알고 있다.
        - 여행자：여러 마을과 도시를 오가던 여행자였다. 떠도는 이단이나 편력하는 기사 가운데에도 아는 사람이 제법 있다.
        - 자유를 갈망하며：평범한 나날에 대한 반발. 자신이라는 틀을 넘어 이단이 되어 버리면 분명 자유로워질 것이라 생각했다.
        - 이루어질 수 없는 첫사랑：어떤 백성을 사랑했다. 사랑은 이루어지지 않았고 그 사람은 그대의 앞에서 사라졌다. 하지만 그 미소는 지금도 그대에게 힘을 준다.
        - 기묘한 첫사랑：한 이단을 만나 그 아름다움에 사랑에 빠졌다. 그를 좇아 모든 것을 버리고⋯ 마침내 같은 시간을 살아가는 몸이 되었다.
        - 변덕：눈앞의 것에 쉽게 정신이 팔린다. 차분히 생각하지 못한다. 나이를 먹어도 변하지 않는 성미다.
        - 새와 짐승의 벗：새나 짐승의 뜻을 어렴풋이 알 수 있다. 그대는 그들의 친구이며 여러 상황에서 도움을 받았고 또 도움을 주어 왔다.
        - 요정의 벗：요정을 끌어당기는 기묘한 매력을 타고났다. 어린 시절부터 그대는 요정과 짐승의 친구였다.
        - 참견쟁이：주변 사람들이 자꾸 신경 쓰인다. 곤란해하는 사람이 있으면 성가셔해도 끼어들고 마는 성미다.
        - 순수한 영혼：속세의 사념에서 너무나 멀리 떨어져 살아왔기에 그대의 영혼은 끝없이 티 없이 아름답다. 그리고 연약하다.
        - 수도자：진조의 사원에서 주교를 섬기던 수도자였었다. 물론 이단 심문 같은 편협한 생각을 가진 것은 아니다.
        - 평온：그대는 가족에게 둘러싸여 사랑이 가득한 삶을 살았다. 평범한 생활, 평범한 나날. 아주, 아주 행복했다.
        - 성실한 사람：고향에서는 성실하기로 이름이 났다. 진실한 인품으로도 알려져 있었다. 그 기질은 지금도 변하지 않아 여유 있게 행동하지 못한다.
        - 숙련자：어떤 전문 기술에 천재적인 능력을 지니고 있다. 고향의 영주조차 그대의 의견과 기술을 의지했을 정도다.
        - 열애：깊고 격렬한, 열병 같은 사랑을 한 적이 있다. 그 사랑의 불꽃은 지금도 그대 안에서 잔불처럼 타오르고 있다.
        - 미모：누구나 부러워하고 돌아보게 되는 미모. 그 아름다움은 널리 알려졌고 기사들조차 그대를 찬미했다.
        - 마녀의 제자：고향 근처에 살던 마녀에게 귀여움을 받았다. 약초와 점술, 이단에 대해 그대는 남보다 잘 알고 있을 것이다.
        - 기사의 벗：어떤 기사에게 깊은 총애를 받아 왔다. 아니, 신분 차이를 넘어선 우정과 친애라 해도 좋을 대등한 유대를 맺었다.
        - 혈통을 잇는 몸：반려를 얻고 아이를 낳아 가정을 이루었다. 그 피는 그대가 더 이상 백성이 아닌 몸이 된 지금도 이어지고 있다.
      ST:
        name: 원풍경 표
        d66_sort_type: NO_SORT
        items:
          11: 학대：그 지옥 같은 나날 속에서 귀경이 당해왔떤 일을 생각하면⋯⋯ 기사가 되어서도, 남을 보는 눈은 어둡다.
          12: 들개와도 같이：고아였던 귀경은 하염없이 훔치고 죽이고 속이며. 수단을 가리지 않고 살아남았다. 기사 앞에는 죄인으로서 끌려나왔다.
          13: 악행：귀경은 서훈 이전, 악한 부덕의 행위에 발을 담그고 있었다. 다행히도 주인에게는 들키지 않은 채 기사가 되었으나⋯⋯ 행동은 바로잡혔을까?
          14: 역겨운 불：고향은 태양의 파편에게 습격당했다. 가족은 목숨을 잃었고, 기사가 귀경을 구해주었다. 그 저주받을 불꽃을, 귀경은 잊지 않았다.
          15: 태양의 꿈：지금은 없는 태양의 빛⋯⋯ 아름답고 생명으로 가득 찼던 세계를, 어린 시절부터 꿈에서 보았다. 기묘한 의심이 마음속에서 사라지질 않는다.
          16: 검은 충동：폭력성이나 잔학성이 귀경의 안에 잠들어 있다. 그것은 이따금 돌발적으로 나타나⋯⋯ 소중한 존재를 파괴하는 것이다.
          21: 얼음의 마음：가혹한 하루하루를 살아가는 가운데, 귀경의 마음은 얼어붙었다. 능력을 평가받아 기사가 되었으나⋯⋯ 마음의 얼음은 아직 녹지 않았다.
          22: 겁쟁이：과거의 귀경은 맞서야 할 존재로부터 도망쳤다. 그것은 기사가 되어서도 여전히 남아있는, 마음의 흠결이다.
          23: 고독：귀경은 줄곧 고독했다. 손을 내밀어주었던 것은 주인 뿐. 주인 없는 나날은 생각할 수도 없다.
          24: 야심：귀경은 더욱 높은 지위를 원한다. 백성으로는 부족하다. 기사가 되고 싶다. 더, 더 많은 것을 지배하고 싶은 것이다.
          25: 정 많은 이：쉽게 사랑에 빠져버린다. 얼마 안 되는 인연으로도, 연인이 된 것처럼 진심으로 모든 것을 다 바쳐버리는 것이다.
          26: 코앞의 타락：고향의 영주가 타락해 포학을 자행했다. 귀경은 기사라는 것을 다른 이들만큼 천진난만하게 믿을 수는 없으리라.
          31: 망상：꿈을 꾸기 일쑤인 귀경은 몇 번이나 자신이 기사가 되는 몽상을 해왔다. 어쩌면 지금도 꿈을 꾸고 있는 것 아닐까.
          32: 공백：과거의 시간 중에 떠올릴 수 없는 시기가 있다. 그동안 무슨 일이 있었는지, 귀경은 아무 것도 모른다.
          33: 경건한 마음：귀경은 사람일 때부터 붉은 달과 드라쿨을 깊이 신앙했다. 변함없는 신앙이야말로 자신을 기사로 이끌어주리라 믿고 있다.
          34: 요정의 인도：들어가서는 안 되는 숲에서 요정과 친해졌다. 그리고 놀던 중, 정신이 들고 보니 당신은 기사의 성에 있었다.
          35: 종자의 일족：태어났을 때부터 종자로 살아가는 일족도 있다. 귀경은 그 속에서 태어나, 재능이 발견되어 기사가 되었던 것이다.
          36: 시정의 마음：극히 평범한 백성의 가정에서 오랫동안 자라났던 귀경은 세속적이면서도, 백성의 시야를 가진 기사가 되리라.
          41: 유랑：귀경은 사람일 무렵부터 유랑을 했던 몸. 시야를 넓힐 생각으로 했던 여행이었으나 종자로서 이 땅에 눌러 앉고 말았다.
          42: 사람의 혈연：혈연자가 기사가 되었다. 그리고 귀경 또한⋯⋯. 귀경의 동포 중에는 사람일 때의 혈연자가 있는 것이다.
          43: 요정의 벗：요정을 끌어들이는 기묘한 매력을 가지고 태어났다. 어렸을 때부터 귀경은 요정이나 동물의 친구였다.
          44: 무구한 영혼：속세의 삿된 마음으로부터 너무나도 멀리 떨어진 채 살아왔기에, 귀경의 영혼은 지나치게 고결하고 아름답다. 그리고 나약하다.
          45: 전장의 짐승：주인과 함께, 귀경은 수많은 전장을 헤쳐나왔다. 싸움은 귀경의 호흡이자 발걸음. 어디에 있더라도 싸움의 폭풍은 놓치지 않는다.
          46: 오랜 격식：귀경은 매우 격식을 중시하는 곳에서 태어나 자랐다. 설령 형해화되었더라도, 오랜 격식을 잊는다면 그 어찌 기사라 하겠는가.
          51: 카리스마：남에게 의지가 되며, 금방 주목을 받는다. 귀경은 태어나면서부터 사람들을 통솔하는 역할이었다. 기사에게는 필요한 재능이라 할 수 있으리라.
          52: 단련의 나날：기사가 될 날을 꿈꾸며, 어린 시절부터 무예의 수련을 빼놓지 않았다. 이제 귀경은 이 정도의 무용을 얻었다.
          53: 보은：과거, 귀경은 어떤 기사에게 도움을 받았다. 그리고 그분을 돕기 위해 종자가 되고⋯⋯ 마침내 기사가 된 것이다.
          54: 기사의 양자：어렸을 때 재능이 발견되어, 철이 들 무렵부터 기사에게 직접 교육과 훈련을 받아왔다. 사람 부모는 모른다.
          55: 영웅 지망：보호만 받는 백성의 생활을 견딜 수 없었다. 귀경은 영웅의 길을 추구해 집을 뛰쳐나와, 종자가 되었던 것이다.
          56: 불타는 사랑：어떤 기사에게 첫눈에 사랑을 느꼈다. 사람의 몸으로는 이룰 수 없는 사랑. 그러나 귀경은 마침내 서훈을 받아 기사가 되었다.
          61: 구세의 마음：사람들은 여러 가지 공포에 떨고, 곤경에 처해 있다. 내가 노력해 어떻게든 할 수 있다면⋯⋯ 그렇게 생각한 귀경은 기사의 길을 택했다.
          62: 미모：귀경의 미모가 평판에 올랐을 무렵, 그 아름다움을 들은 기사가 나타나 귀경을 성으로 데려갔다.
          63: 동경하는 기사：귀경에게는 동경하는 기사가 있다. 언젠가 반드시 그 사람과 같은 곳에 서겠다고, 마음속으로 결심한 사람이 있는 것이다.
          64: 드라클의 꿈：어느 날 꿈에, 드라쿨께서 귀경 앞에 강림하셨다. 그리고 인생 전부를 바꿔놓을 신탁을 내려주셨다.
          65: 신동：때로는 귀경처럼 남아도는 재능을 가지고 태어나는 자가 있다. 그리고 운명으로 정해진 것처럼 기사의 길을 걷게 되는 것이다.
          66: 운명의 아이：귀경이 태어났을 때, 떠돌이 현자가 찾아왔다. 귀경은 틀림없이 전설에 남을 기사가 되리라. 그렇게 약속받은 것이다.
      PN:
        name: 수난 표
        d66_sort_type: NO_SORT
        items:
          11: 지옥：기사의 손에 의해 그대는 한 번 지옥에 봉인된 적이 있다. 간신히 탈출할 수 있었던 것은, 행운 외에는 달리 설명할 길이 없을 것이다.
          12: 폭발한 살의：죽일 생각 따위는 없었다. 그저 사소한 말다툼에서 순간 화가 치밀어 올라⋯ 한 명의 백성을 그대의 손으로 죽이고 말았다.
          13: 복수의 길：예전에 그대는 친구에게 배신당해 모든 것을 빼앗겼다. 이제 그대의 삶은 옛 친구를 묻어버리기 위해 존재한다.
          14: 이단 심문：그 끔찍한 이단심문관들에게 붙잡혀 굴욕과 고통을 겪었다. 그 자들의 존재 따위는 결코 인정하지 않겠다⋯
          15: 원수：잊어서는 안 되는 적이 있다. 그 자의 가슴을 꿰뚫고 목을 베기 전까지 그대에게 안식의 날은 오지 않는다. 결코 오지 않는다.
          16: 타락의 누명：한 기사가 타락했다. 그러나 백성과 다른 기사들은 그 죄를 당사자가 아니라⋯ 이단인 그대에게 뒤집어씌웠다.
          21: 저주받은 불꽃：고향은 태양의 파편에 습격당했다. 모든 것이 불타고 그대 또한 상처를 입었다. 그 저주스러운 불길을 결코 잊지 않겠다.
          22: 참극에 서 있다：정신을 차리고 보니 수많은 백성의 피와 살이 흩날리는 참극 한가운데에 서 있었다. 이것이 정말 그대의 소행이었던 것일까⋯? 대답해 줄 이는 없다.
          23: 이형에 대한 거부：예전의 그대는 자신의 이단의 몸을 받아들일 수 없었다. 몇 번이나 자신의 이형을 잘라내며 타락의 낭떠러지에서 방황했다.
          24: 타락의 이정표：무심코 던진 말이 친구의 마음을 상처 입혔다. 그 자는 결국 타락했다. 그대의 말이 계기가 아니라고 어떻게 말할 수 있겠는가.
          25: 힘에 취하다：이단의 힘을 얻고 의기양양해졌다. 스스로를 왕이라 믿고 백성에게 폭정을 저질렀다. 곧 자신의 잘못을 깨닫기는 했지만⋯.
          26: 가까운 타락：친구나 연인이 타락했다. 잊을 수 없는 과거다. 자칫하면 자신 또한 그렇게 될지도 모른다는 어두운 미래를 떠올리게 된다.
          31: 백성에 대한 실망：신뢰를 쌓아 온 백성들이 이단심문관의 말에 휘둘려 그대를 욕하기 시작했다. 그대가 도대체 무엇을 했다는 것인가.
          32: 백성의 함정：따뜻하게 환영받고 숙소에 묵게 되었지만⋯ 잠든 그대를 습격한 것은 이단심문관이었다. 이제 백성 따위 믿지 않는다.
          33: 이단경의 친구：그대가 잘 아는 이단이, 그대의 친구인 기사를 재서훈하여 이단경으로 바꾸었다. 그대만이⋯ 아무것도 듣지 못한 채였다.
          34: 타락자의 모습：그대는 타락자에게 습격당했다. 가까스로 살아남았지만 그 괴물의 모습은⋯ 언젠가 자신도 그렇게 되는 것일까.
          35: 그래도 힘이：그대는 기사가 되지 못했다. 그럼에도 힘을 원해⋯ 이단에게 매달려 예속의 대가로 힘을 얻었다.
          36: 돌팔매질：인간이 아닌 힘을 지닌 그대에게 백성들은 돌을 던지며 쫓아냈다. 아무것도 하지 않았는데도⋯ 이제 백성을 믿을 수 없다.
          41: 저주：요정에게 저주를 받았다. 저주는 천천히 그대를 잠식하며 몸에 재앙을 부른다. 이제는 풀린 것일까?
          42: 바라지 않은 구원：수난에서 그대를 구한 이는 더 큰 재앙이었다. 구원자는 폭군이 되어 그대의 모든 것을 지배했다.
          43: 더러운 일：기사에게 고용되어 비열한 일을 했다. 결국 모든 오명을 뒤집어쓰고 그 땅에서 도망칠 수밖에 없었다.
          44: 이단의 거처：가서는 안 될 곳에 갔고 만나서는 안 될 이단을 만났다. 그 일 이후 그대는 고향으로 돌아갈 수 없는 몸이 되었다.
          45: 사별：특별한 존재였던 백성이⋯ 잠시 보지 못한 사이 죽어 있었다. 그를 이단으로 바꾸어 함께 시간을 보내려 했건만.
          46: 진실한 사랑：지금까지의 사랑은 그저 욕망이었음을 깨달았다. 그대는 진정한 사랑을 알게 되었다. 모든 것이 늦어버린 뒤에야⋯.
          51: 거절：사랑했던 백성이 있었다. 그를 이단으로 바꾸어 긴 시간을 함께하고 싶었지만⋯ 당사자에게 거절당했다.
          52: 마지막 발버둥：백성으로서 죽을 뻔했다. 깨끗이 죽었어야 했지만⋯ 마지막 순간 집착에 사로잡혔다. 대가를 치르고 이단이 되었다.
          53: 죽음의 맛：그대는 분명 한 번 죽었을 것이다. 생명을 잃고 몸이 차가운 덩어리로 변해 가던 그 순간을⋯ 너무도 잘 기억하고 있으니까.
          54: 요정의 인도：들어가서는 안 될 숲에서 요정과 친해졌다. 장난치며 놀던 사이 정신을 차려 보니 낯선 땅과 시대에 와 있었다.
          55: 걸림돌：사소한 실수가 마음속에 침전물처럼 남아 있다. 이 근심이 사라질 날이 올까.
          56: 망각：그대에게 끔찍한 일이 있었던 것만은 분명하다⋯ 하지만 기억이 나지 않는다. 도대체 무슨 일이 있었던 것일까?
          61: 인간이 아닌 사랑：그대는 이단과 사랑에 빠졌다. 달콤하고 광기 어린 시간 속에서 세월이 흘렀고, 결국 그 연인의 손으로 이단의 몸을 얻었다.
          62: 주인의 변덕：그날 그대는 분명 죽었어야 했다⋯ 그러나 지나가던 주인이 그대를 이단으로 바꾸어 구해 주었다.
          63: 비극의 예언：마녀가 그대에게 예언했다⋯ 언젠가 가장 소중한 사람을 자신의 손으로 죽이게 될 것이라고.
          64: 유혹：그대는 외로운 이단을 달콤한 말로 유혹해 마음을 흔들고 동포로 삼게 했다. 정신적인 면에서의 주인은 오히려⋯
          65: 고독：그대는 늘 고독했다. 이단이 된 지금도 고독하다. 이대로 타락을 기다릴 뿐일 것이라 생각했지만⋯
          66: 물 안의 개구리：스스로가 최강이라 믿고 있던 그대였지만⋯ 한 명의 기사를 보고 그 생각은 무너졌다. 세계는 아직도 넓다.
      CS:
        name: 타락의 조짐표
        type: 2D6
        items:
        - 당신은 완전히 타락했다. 이 시점에서 당신은 [벽의 꽃]이 되며, 늑대인간, 검은 염소, 야수경 중 하나가 된다. 그 [막]이 종료된 후에 세션에서 퇴장한다. P238의「소멸・완전한 타락」도 참조할 것.
        - 짐승 그 자체의 머리(늑대, 염소, 박쥐 중 하나)
        - 밤새의 날개
        - 박쥐의 날개
        - 갈퀴발톱이 달린 이형의 팔
        - 뒤틀린 두 개의 뿔
        - 늑대의 귀와 꼬리
        - 푸르스름한 피부
        - 기이한 빛을 머금은 눈
        - 튀어나온 송곳니
        - 눈에 뜨이는 변화는 없다⋯⋯
      ECS:
        name: 확장・타락의 조짐표
        d66_sort_type: NO_SORT
        items:
          11: 완전한 타락：당신은 [벽의 꽃]이 되며, 타락자 중 어느 하나가 된다. 그 [막]이 종료된 후에 세션에서 퇴장한다. (기본 P239)
          12: 기괴한 체구：몸이 부풀어오른 것처럼 과도할 정도의 근육이 붙고, 체구도 거구가 된다. 타락이 가까워졌다.
          13: 살육귀：백성과 접하면, 더 이상 귀경은 충동을 억누를 수 없다. 갈기갈기 찢어 죽이고, 피를 빨아먹을 것이다. 백성에게 다가가서는 안 된다⋯⋯.
          14: 짐승의 머리：머리가 늑대나 염소, 박쥐의 것이 된다. 멀리서도 알아볼 수 있는 이상성이며, 늑대인간으로 오해를 사 토벌되는 기사도 있다고 한다.
          15: 원초의 갑주：몸의 많은 부분이 칠흑의 덩어리가 되어 사위스러운 괴물 같은 몸으로 변한다. 얼굴 또는 얼굴의 절반은 원래의 형태를 유지할 수 있을 것이다.
          16: 밤새의 날개：등에 검은색 새의 날개가 돋아난다. 이제는 스트리가와 다를 바 없으며, 귀경은 항상 이단과 함께 조롱을 당할 것이다.
          21: 박쥐의 날개：등에 박쥐의 날개가 돋아난다. 결코 숨길 수 없고, 결정적으로 하늘을 날 수도 있는⋯⋯ 털이 돋아난 검은 날개다.
          22: 갈라진 피부：온몸의 피부가 균열을 일으킨다. 속에서는 항상 붉은 빛이 스멀스멀 새나온다. 모습이 아름답더라도, 그 광경은 이미 괴물이다.
          23: 퇴폐의 향：달콤하게 마음을 녹이는 향이 온몸에서 솟아난다. 기사라면 몰라도, 백성에게는 마약이나 미약 같은 작용을 한다.
          24: 이형의 팔：알귀를 연상케 하는 갈퀴발톱을 가진 팔. 표면은 타르 같은 칠흑의 덩어리로 뒤덮였으며⋯⋯ 일그러진 흉악한 형태를 하고 있다.
          25: 도깨비불이 깃든 눈：눈에 도깨비불이 깃든다. 이 기이한 빛은 눈에서 넘쳐나, 불꽃이 되어 항상 일렁인다. 귀경과 제대로 마주볼 수 있는 자는 이제 없다.
          26: 악의 가시：팔꿈치나 무릎, 주먹, 이마, 혹은 더 생각지도 못한 곳에서 검은색이나 붉은색의 날카로운 가시가 돋아난다. 그 주변의 피부도 딱딱해지기 시작한다.
          31: 기이한 각인：얼굴을 포함한 온몸의 피부에 붉은 빛으로 된 이단과도 같은 각인이 나타난다. 욕망의 성질에 따라 각인의 양상은 항상 달라진다.
          32: 독사：어깨에서, 혹은 꼬리처럼, 사위스러운 독사가 돋아난다. 소매나 옷자락에서 보이면 구현화한 사역수로 보이지 않을 것도 없겠지만⋯⋯.
          33: 제3의 눈：귀경의 이마에 제3의 눈이 열린다. 머리카락이나 후드로 가리지 못할 것도 없겠지만⋯⋯ 끝까지 숨기기란 어려울 것이다.
          34: 퍼져가는 비늘：귀경의 몸 곳곳이 비늘로 덮이기 시작한다. 천천히 퍼져가는 그것은 이윽고 숨길 수도 없을 지경이 될 것이다.
          35: 짐승 울음소리：귀경의 몸속에서 짐승이 으르렁거리는 소리가 들려오게 된다. 나중에는 짐승 냄새도 풍기기 시작하리라. 내면은 이미 짐승이 되어가고 있다.
          36: 변신：어째서 이렇게 되었는지⋯⋯ 귀경은 성별, 외견 연령, 체격 중 어느 하나가, 혹은 전체가 크게 달라지고 만다.
          41: 염소의 뿔：머리에서 두 개의 뒤틀린 긴 염소 뿔이 돋아난다. 이 뿔은 구현화 등으로 숨기거나 할 수 없다.
          42: 송곳니가 난 주둥이：이빨이 전부 뾰족하게 바뀌며, 입 자체 또한 크게 벌어지게 된다. 웃는 얼굴도 위협하는 것처럼 보이리라.
          43: 용의 날개：등에 비늘로 덮인 강인한 날개가 돋아난다. 활공 정도는 가능할 것이다. 다행히도 용의 날개는⋯⋯ 길조로 보는 기사도 많다.
          44: 염소의 다리：의상으로 어떻게든 가릴 수 있는 것이 다행이지만⋯⋯ 그 다리는 검은 염소의 것이 되고 말았다. 보는 이는 혐오로 눈살을 찌푸릴 것이다.
          45: 늑대의 귀와 꼬리：귀경의 머리에 늑대의 귀가, 엉덩이에 늑대의 꼬리가 나타난다. 이것은 짐승처럼 귀경의 감정에 따라 움직인다.
          46: 어둠이 넘치는 눈：눈의 흰자위가 검어진다. 또한 눈에서는 어둠이 스며나와 넘치며, 검은 불꽃과도 같이 일렁인다.
          51: 파르스름한 피부：시체처럼 차갑고, 또한 기이하게 파르스름한 피부가 된다. 언뜻 봐도 귀경의 타락은 명백하다.
          52: 발작적 변신：【갈증】이 늘어날 때마다, 귀경의 모습은 한순간이지만 특정한 타락자의 모습으로 변신해버린다. 끔찍한 말로의 암시인 것이다.
          53: 구현화 불안정：구현화가 불안정해진다. 귀경이 구현화한 것은 모두 일그러지고 우아함을 잃어버린 이형이 되리라.
          54: 기이하게 빛나는 눈：눈이 도깨비불처럼 빛난다. 그것은 어둠 속에서 끔찍하게 꼬리를 끌며 무의식중에 사냥감을 노릴 것이다.
          55: 눈에 뜨이는 송곳니：덧니라고 하기에는 너무 길고 날카로운 송곳니. 입맞춤을 하 때, 자칫하면 상대의 피부에 흠을 내버릴 것만 같다⋯⋯.
          56: 마녀 손톱：손발톱이 기이한 갈퀴처럼 변한다. 구현화하여 얼버무릴 수도 없다⋯⋯ 건틀렛 같은 것을 항상 착용하면 가능할까.
          61: 가감 곤란：귀경의 힘은 제어가 어려워진다. 자칫 실수해 가구를 부수거나 백성에게 상처를 입히고 말 것이다.
          62: 긴 혀：귀경의 혀는 자신의 눈까지 닿을 정도로 길어진다. 다행히도 늘려서 보여주지 않는 한은 외부에서 알아볼 수 없겠지만⋯⋯.
          63: 발칙한 입맞춤：입맞춤을 할 때마다, 기이한 욕정이 귀경을 엄습한다. 그 입맞춤의 작법은 천하고 음란한 것이 되고 말리라.
          64: 타락의 그림자：붉은 달빛이 비추는 귀경의 그림자는 이미 타락자의 것이다. 초면이라면 몰라도, 오랫동안 들키지 않을 수는⋯⋯ 없으리라.
          65: 월광욕：지붕이 있다면 불쾌감을 느낀다. 가급적 달빛을 받을 수 있는 장소에 있고 싶다. 궁정에서도 정원이나 발코니를 선호하리라.
          66: 행운：자각할 만한 조짐은 없는 듯하지만⋯⋯ 늘 스스로를 다스려야만 하리라. 귀경은 이미 타락의 경계선에 있음을 자각하라.
